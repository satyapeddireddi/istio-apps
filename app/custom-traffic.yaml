apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-canary
  namespace: app
spec:
  parentRefs:
  - name: podinfo-gateway
    namespace: app
  rules:
  - backendRefs:
    - name: podinfo
      port: 9898
      weight: 80
    - name: podinfo-v2
      port: 9898
      weight: 20
