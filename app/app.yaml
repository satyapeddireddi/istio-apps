# Save as gateway-fix.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: podinfo-gateway
  namespace: app
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All # This allows your 'app' namespace to attach its route
---

# 1. Reset Services to match Pod Logs (Port 9898)
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: app
spec:
  ports:
  - name: http
    port: 9898
    targetPort: 9898
  selector:
    app: podinfo

---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-v2
  namespace: app
spec:
  ports:
  - name: http
    port: 9898
    targetPort: 9898
  selector:
    app: podinfo-v2

---
# 2. Set mTLS to PERMISSIVE (Prevents 503s if sidecars are out of sync)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: app
spec:
  mtls:
    mode: PERMISSIVE

---
# 3. Ensure the Route points to the 9898 Service Port
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-canary
  namespace: app
spec:
  parentRefs:
  - name: podinfo-gateway
    namespace: app
  rules:
  - backendRefs:
    - name: podinfo
      port: 9898
      weight: 75
    - name: podinfo-v2
      port: 9898
      weight: 25
