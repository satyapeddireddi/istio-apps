# 5. HTTPRoute (Kubernetes Gateway API)
# If you are moving toward the modern Gateway API standard, 
# use an HTTPRoute to handle the ingress traffic.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: istio-lab
spec:
  parentRefs:
  - name: gateway
    namespace: istio-lab
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: frontend-svc
      port: 80