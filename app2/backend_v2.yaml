---
# 4. BACKEND: Version 2 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: istio-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v2
  template:
    metadata:
      labels:
        app: backend
        version: v2
    spec:
      containers:
      - name: backend
        image: ghcr.io/stefanprodan/podinfo:6.3.5
        ports:
        - containerPort: 8080
