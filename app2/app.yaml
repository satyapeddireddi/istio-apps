---
# FRONTEND SERVICE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: istio-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # Switched to official stable repository
        image: stefanprodan/podinfo:latest 
        ports:
        - containerPort: 9898
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: istio-lab
spec:
  ports:
  - port: 80
    targetPort: 9898
  selector:
    app: frontend

---
# BACKEND SERVICE (Version 1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  namespace: istio-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
      - name: backend
        # Using a highly available go-httpbin image
        image: mccutchen/go-httpbin:latest
        ports:
        - containerPort: 8080
---
# BACKEND SERVICE (Version 2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: istio-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v2
  template:
    metadata:
      labels:
        app: backend
        version: v2
    spec:
      containers:
      - name: backend
        image: mccutchen/go-httpbin:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: istio-lab
spec:
  ports:
  - port: 80
    # Updated to 8080 to match the go-httpbin container port
    targetPort: 8080 
  selector:
    app: backend
    