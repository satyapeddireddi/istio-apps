# 2. FRONTEND (Service + Deployment)
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: istio-lab
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 9898
    nodePort: 30012
    protocol: TCP
    name: http-frontend # Fixed KIA0601 protocol naming
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: istio-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: stefanprodan/podinfo:latest # Stable official image
        ports:
        - containerPort: 9898

---
# 3. BACKEND (Service + Version 1 Deployment)
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: istio-lab
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http-backend # Fixed KIA0601 protocol naming
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  namespace: istio-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
      - name: backend
        image: mccutchen/go-httpbin:latest # Stable official image
        ports:
        - containerPort: 8080

---
# 4. BACKEND (Version 2 Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: istio-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v2
  template:
    metadata:
      labels:
        app: backend
        version: v2
    spec:
      containers:
      - name: backend
        image: mccutchen/go-httpbin:latest
        ports:
        - containerPort: 8080